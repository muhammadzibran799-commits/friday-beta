<!DOCTYPE html>
<html>
    <head>
        <style>
        #area-chat {
                height:400px;
                border-top:1px solid #e0e0e0;
                border-bottom: 1px solid #e0e0e0;
                overflow-y: auto;
                padding: 16px;
                background-color: #f5f5f5;
            }
        .pesan-user{
            background-color: #d0d0d0;
            padding: 8px 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            margin-left:auto ;
            max-width: 70%;
        }

        .pesan-ai{
            background-color: #d0d0d0;
            padding: 8px 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            max-width: 70%;
        }
        
        body {
            background-color: #4a4a4a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #container {
            background-color: white;
            width: 600px;
            border-radius: 12px;
        }

        #header {
            display: flex;
            justify-content: space-between;
            padding: 16px;
        }

        #input-area{
            justify-content: center;
            align-items: center;
            padding: 16px;
            display: flex;
        }

        </style>
    <body>
        <div id="container">
            <div id="header">
                <span>Friday</span>
                <span>Online</span>
            </div>
            <div id="area-chat">

            </div>
            <div id="input-area">
                <input id="input">
                <button id="tombol-kirim">Send</button>
            </div>
        </div>
            <script>
            document.getElementById("tombol-kirim").addEventListener("click", function() {

            pesan=document.getElementById("input").value ;

            document.getElementById("area-chat").innerHTML +="<div class= 'pesan-user'>You:" + pesan + "</div>";
            document.getElementById("input").value="";

            fetch("http://localhost:8000/chat", {
            method: "POST",
            headers: {
            "Content-Type": "application/json"
            },
            body: JSON.stringify({ pesan: pesan })
            }).then(function(response){
                return response.json()
            }).then(function(data){
                document.getElementById("area-chat").innerHTML += "<div class='pesan-ai'>AI:" + data.jawaban + "</div>";
                document.getElementById("area-chat").scrollTop = document.getElementById("area-chat").scrollHeight
            }) 
            });


            document.getElementById("input").addEventListener("keydown",function(event){
                if (event.key==="Enter"){
                    pesan=document.getElementById("input").value ;

                    document.getElementById("area-chat").innerHTML +="<div class= 'pesan-user'>You:" + pesan + "</div>";
                    document.getElementById("input").value="";

                    fetch("http://localhost:8000/chat", {
                    method: "POST",
                    headers: {
                    "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ pesan: pesan })
                    }).then(function(response){
                        return response.json()
                    }).then(function(data){
                        document.getElementById("area-chat").innerHTML += "<div class='pesan-ai'>AI:" + data.jawaban + "</div>";
                        document.getElementById("area-chat").scrollTop = document.getElementById("area-chat").scrollHeight
                    })
                }
            })
        </script>

    </body>
</html>
